<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 132">
<defs>
  <filter id="gs" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gm" x="-130%" y="-130%" width="360%" height="360%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gl" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Body gradients – purple tinted -->
  <linearGradient id="gbody" x1="0" y1="0" x2="0.1" y2="1">
    <stop offset="0%" stop-color="#1e1a38"/>
    <stop offset="50%" stop-color="#141228"/>
    <stop offset="100%" stop-color="#0c0a1c"/>
  </linearGradient>
  <linearGradient id="ggrip" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#13102a"/>
    <stop offset="100%" stop-color="#060510"/>
  </linearGradient>
  <linearGradient id="gbump" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#28224a"/>
    <stop offset="100%" stop-color="#181530"/>
  </linearGradient>
  <linearGradient id="gtl" x1="0.2" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#1c1838"/>
    <stop offset="100%" stop-color="#10102a"/>
  </linearGradient>
  <linearGradient id="gtr" x1="0.8" y1="1" x2="1" y2="0">
    <stop offset="0%" stop-color="#1c1838"/>
    <stop offset="100%" stop-color="#10102a"/>
  </linearGradient>
  <radialGradient id="gwell" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#0a0818"/>
    <stop offset="100%" stop-color="#05040e"/>
  </radialGradient>
  <radialGradient id="gstick" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#1e1a38"/>
    <stop offset="100%" stop-color="#0c0a20"/>
  </radialGradient>

  <!-- Buttons – UNCHANGED -->
  <radialGradient id="gxbox" cx="30%" cy="25%" r="70%">
    <stop offset="0%" stop-color="#00ff90"/>
    <stop offset="100%" stop-color="#009a50"/>
  </radialGradient>
  <radialGradient id="gby" cx="32%" cy="28%" r="68%">
    <stop offset="0%" stop-color="#d4a820"/>
    <stop offset="100%" stop-color="#906010"/>
  </radialGradient>
  <radialGradient id="gbx" cx="32%" cy="28%" r="68%">
    <stop offset="0%" stop-color="#2280cc"/>
    <stop offset="100%" stop-color="#0e5090"/>
  </radialGradient>
  <radialGradient id="gbb" cx="32%" cy="28%" r="68%">
    <stop offset="0%" stop-color="#cc2020"/>
    <stop offset="100%" stop-color="#880e0e"/>
  </radialGradient>
  <radialGradient id="gba" cx="32%" cy="28%" r="68%">
    <stop offset="0%" stop-color="#20a840"/>
    <stop offset="100%" stop-color="#0e6828"/>
  </radialGradient>

  <!-- Purple neon gradients -->
  <linearGradient id="gneon" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9933ff"/>
    <stop offset="50%" stop-color="#cc55ff"/>
    <stop offset="100%" stop-color="#6611cc"/>
  </linearGradient>
  <linearGradient id="gneon2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6611cc"/>
    <stop offset="50%" stop-color="#cc55ff"/>
    <stop offset="100%" stop-color="#9933ff"/>
  </linearGradient>

  <!-- Hex grid texture – purple tint -->
  <pattern id="hexgrid" width="10" height="10" patternUnits="userSpaceOnUse">
    <path d="M5,0 L10,3 L10,7 L5,10 L0,7 L0,3 Z" fill="none" stroke="#9966cc" stroke-width="0.22"/>
  </pattern>
</defs>

<!-- Outer controller aura -->
<ellipse cx="100" cy="65" rx="85" ry="52" fill="#9933ff" opacity="0.028" filter="url(#gl)"/>

<!-- ===== GRIPS ===== -->
