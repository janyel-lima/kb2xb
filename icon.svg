<text x="49" y="9" text-anchor="middle" dominant-baseline="middle" font-family="Arial Narrow,Arial,sans-serif" font-size="5.8" font-weight="700" letter-spacing="0.5" fill="#cc99ff" opacity="0.92">LT</text>
