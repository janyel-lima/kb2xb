<rect x="6" y="65" width="50" height="65" rx="20" fill="none" stroke="#9933ff" stroke-width="0.9" stroke-opacity="0.42"/>
<rect x="9" y="95" width="44" height="2.2" rx="1.1" fill="url(#gneon)" opacity="0.75" filter="url(#gs)"/>
<rect x="11" y="107" width="40" height="16" rx="10" fill="#fff" opacity="0.016"/>

